<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  <!-- Outer Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="rgba(139, 92, 246, 0.15)" stroke-width="4" />
  <!-- Glowing Diamond Logo -->
  <path d="M256 96 L384 256 L256 416 L128 256 Z" fill="url(#logoGrad)" filter="url(#glow)" />
  <path d="M256 128 L352 256 L256 384 L160 256 Z" fill="rgba(255, 255, 255, 0.1)" />
  <!-- Inner Diamond highlights -->
  <path d="M256 96 L256 256 L128 256 Z" fill="rgba(255, 255, 255, 0.08)" />
  <path d="M256 96 L384 256 L256 256 Z" fill="rgba(0, 0, 0, 0.08)" />
</svg>
